<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeHer Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="theme-body">

    <div class="auth-page">
        <div class="auth-card glass-card">
            <div class="brand-top-center">
                <img src="https://cdn-icons-png.flaticon.com/512/3064/3064197.png" alt="logo">
                <h1>SafeHer</h1>
                <p class="auth-subtitle">Login to continue safely</p>
            </div>

            <div class="tab-buttons">
                <button class="tab-btn {% if active_tab == 'email' %}active{% endif %}" onclick="showTab('emailTab', this)">Email</button>
                <button class="tab-btn {% if active_tab == 'phone' %}active{% endif %}" onclick="showTab('phoneTab', this)">Phone OTP</button>
            </div>

            {% if error %}
                <p class="error-msg">{{ error }}</p>
            {% endif %}

            {% if message %}
                <p class="success-msg">{{ message }}</p>
            {% endif %}

            <div id="emailTab" class="tab-content {% if active_tab == 'email' %}active{% endif %}">
                <form action="/auth" method="POST">
                    <div class="input-group">
                        <label>Email</label>
                        <div class="input-box">
                            <i class="fa fa-envelope"></i>
                            <input type="email" name="email" placeholder="Enter your email" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Password</label>
                        <div class="input-box">
                            <i class="fa fa-lock"></i>
                            <input type="password" name="password" placeholder="Enter password" required>
                        </div>
                    </div>

                    <button type="submit" class="btn-primary full-btn">Login</button>
                </form>

                <p class="switch-text">
                    New user? <a href="/signup">Create account</a>
                </p>
            </div>

            <div id="phoneTab" class="tab-content {% if active_tab == 'phone' %}active{% endif %}">
                <form action="/send-otp" method="POST">
                    <div class="input-group">
                        <label>Phone Number</label>
                        <div class="input-box">
                            <i class="fa fa-phone"></i>
                            <input type="text" name="phone" placeholder="Enter 10 digit mobile number" required>
                        </div>
                    </div>

                    <button type="submit" class="btn-primary full-btn">Send OTP</button>
                </form>

                <form action="/verify-otp" method="POST" class="otp-form">
                    <div class="input-group">
                        <label>Enter OTP</label>
                        <div class="input-box">
                            <i class="fa fa-key"></i>
                            <input type="text" name="otp" placeholder="Enter OTP" required>
                        </div>
                    </div>

                    <button type="submit" class="btn-primary full-btn">Verify OTP</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        function showTab(tabId, btn) {
            let tabs = document.querySelectorAll('.tab-content');
            let buttons = document.querySelectorAll('.tab-btn');

            tabs.forEach(tab => tab.classList.remove('active'));
            buttons.forEach(button => button.classList.remove('active'));

            document.getElementById(tabId).classList.add('active');
            btn.classList.add('active');
        }
    </script>

</body>
</html>
